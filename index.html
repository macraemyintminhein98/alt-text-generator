<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Altify: Image Alt Text Generator</title><script src="https://cdn.tailwindcss.com"></script><style>body{font-family: ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,"Noto Sans",sans-serif,"Apple Color Emoji","Segoe UI Emoji","Segoe UI Symbol","Noto Color Emoji";}</style></head><body class="bg-gray-100 flex items-center justify-center min-h-screen"><div class="bg-white p-8 rounded shadow-md w-full max-w-md"><h1 class="text-2xl font-bold mb-6 text-center">Altify: Alt Text Generator</h1><p class="mb-4 text-center text-gray-600">Generate SEO-friendly alt text for your product images from titles.</p><div id="tool-container"><input type="text" id="productTitle" class="w-full p-2 mb-4 border rounded focus:outline-none focus:ring-2 focus:ring-blue-500" placeholder="Enter product title (e.g., 'Red Leather Smartwatch')"><button id="generateAltText" class="w-full bg-blue-600 text-white p-2 rounded hover:bg-blue-700">Generate Alt Text</button><div class="mt-6 p-4 bg-gray-50 border rounded text-sm text-gray-800"><label for="altTextOutput" class="block font-medium mb-2">Generated Alt Text:</label><textarea id="altTextOutput" rows="3" class="w-full border rounded p-2 bg-white" readonly placeholder="Your alt text will appear here."></textarea></div></div><div id="payment-container" class="hidden text-center"><h2 class="text-xl font-semibold mb-4">Unlock Full Functionality</h2><p class="mb-6">Get unlimited alt text generation for a one-time fee of $9.99.</p><p><button id="checkoutButton" class="bg-green-600 text-white p-3 rounded-lg hover:bg-green-700">Pay with Stripe</button></p></div></div><script>document.addEventListener('DOMContentLoaded', () => {const productTitleInput = document.getElementById('productTitle');const generateButton = document.getElementById('generateAltText');const altTextOutput = document.getElementById('altTextOutput');const toolContainer = document.getElementById('tool-container');const paymentContainer = document.getElementById('payment-container');const checkoutButton = document.getElementById('checkoutButton');let uses = 0;const MAX_FREE_USES = 2;generateButton.addEventListener('click', () => {if (uses >= MAX_FREE_USES) {toolContainer.classList.add('hidden');paymentContainer.classList.remove('hidden');return;}const title = productTitleInput.value.trim();if (title) {altTextOutput.value = `A close-up image of a ${title.toLowerCase()}.`;uses++;} else {altTextOutput.value = 'Please enter a product title.';}});checkoutButton.addEventListener('click', async () => {alert('Stripe integration (mock): Redirecting to checkout...'); /* In a real app, integrate Stripe Checkout */});});</script></body></html>
